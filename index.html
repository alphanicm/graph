<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테일러 다항식 시각화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
</head>
<body class="bg-gray-50 h-screen text-gray-800 font-sans p-2 md:p-4 overflow-hidden">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg h-full flex flex-col">
        <div class="bg-blue-600 text-white p-3 rounded-t-xl shrink-0">
            <h1 class="text-xl md:text-2xl font-bold text-center">초월함수 테일러 근사 시뮬레이션</h1>
        </div>

        <div class="p-4 flex flex-col gap-4 flex-grow overflow-hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-100 p-4 rounded-lg shrink-0">
                
                <div class="flex flex-col space-y-1">
                    <label for="funcSelect" class="font-semibold text-gray-700 text-sm">함수 선택:</label>
                    <select id="funcSelect" class="p-2 border border-gray-300 rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-sm">
                        <option value="sin">sin(x)</option>
                        <option value="cos">cos(x)</option>
                        <option value="exp">e^x</option>
                    </select>
                </div>

                <div class="flex flex-col space-y-1">
                    <label for="nSlider" class="font-semibold text-gray-700 flex justify-between text-sm">
                        <span>다항식 차수 (n):</span>
                        <span id="nValueDisplay" class="bg-blue-600 text-white px-2 py-0.5 rounded-full text-xs font-bold w-10 text-center">1.0</span>
                    </label>
                    <input type="range" id="nSlider" min="0" max="20" step="0.05" value="1" class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer mt-2">
                    <div class="flex justify-between text-[10px] text-gray-500 mt-1">
                        <span>0</span>
                        <span>20</span>
                    </div>
                </div>
            </div>

            <div class="bg-blue-50 p-2 rounded-lg border border-blue-100 min-h-[60px] flex items-center justify-center overflow-x-auto shrink-0">
                <div id="formula" class="text-base md:text-lg text-gray-800 whitespace-nowrap"></div>
            </div>

            <div class="border border-gray-200 rounded-lg overflow-hidden shadow-inner bg-white flex-grow relative">
                <div id="plot" class="absolute inset-0 w-full h-full"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. 수학적 계산 헬퍼 함수
        const factCache = [1, 1];
        function factorial(num) {
            if (factCache[num]) return factCache[num];
            let result = factCache[factCache.length - 1];
            for (let i = factCache.length; i <= num; i++) {
                result *= i;
                factCache[i] = result;
            }
            return result;
        }

        function calcExpTaylor(x, n) { let sum = 0; for (let k = 0; k <= n; k++) sum += Math.pow(x, k) / factorial(k); return sum; }
        function calcSinTaylor(x, n) { let sum = 0; for (let k = 0; k <= n; k++) if (k % 2 !== 0) sum += ((Math.floor((k - 1) / 2) % 2 === 0) ? 1 : -1) * Math.pow(x, k) / factorial(k); return sum; }
        function calcCosTaylor(x, n) { let sum = 0; for (let k = 0; k <= n; k++) if (k % 2 === 0) sum += ((Math.floor(k / 2) % 2 === 0) ? 1 : -1) * Math.pow(x, k) / factorial(k); return sum; }

        function getOriginalY(func, xVals) {
            if (func === 'sin') return xVals.map(x => Math.sin(x));
            if (func === 'cos') return xVals.map(x => Math.cos(x));
            if (func === 'exp') return xVals.map(x => Math.exp(x));
        }

        function getSmoothTaylorY(func, continuousN, xVals) {
            const n1 = Math.floor(continuousN);
            const n2 = Math.min(20, n1 + 1);
            const r = continuousN - n1;
            return xVals.map(x => {
                let y1, y2;
                if (func === 'sin') { y1 = calcSinTaylor(x, n1); y2 = calcSinTaylor(x, n2); }
                else if (func === 'cos') { y1 = calcCosTaylor(x, n1); y2 = calcCosTaylor(x, n2); }
                else { y1 = calcExpTaylor(x, n1); y2 = calcExpTaylor(x, n2); }
                return (1 - r) * y1 + r * y2;
            });
        }

        // 2. 수식(LaTeX) 문자열 생성 함수
        function generatePolynomialString(func, n) {
            let terms = [];
            if (func === 'exp') {
                for (let k = 0; k <= n; k++) terms.push(k === 0 ? '1' : (k === 1 ? '+ x' : `+ \\frac{x^{${k}}}{${k}!}`));
            } else if (func === 'sin') {
                for (let k = 0; k <= n; k++) if (k % 2 !== 0) terms.push(`${(Math.floor((k - 1) / 2) % 2 === 0) ? '+' : '-'} ${k === 1 ? 'x' : `\\frac{x^{${k}}}{${k}!}`}`);
                if (terms.length > 0 && terms[0].startsWith('+ ')) terms[0] = terms[0].substring(2);
            } else if (func === 'cos') {
                for (let k = 0; k <= n; k++) if (k % 2 === 0) terms.push(`${(Math.floor(k / 2) % 2 === 0) ? '+' : '-'} ${k === 0 ? '1' : `\\frac{x^{${k}}}{${k}!}`}`);
                if (terms.length > 0 && terms[0].startsWith('+ ')) terms[0] = terms[0].substring(2);
            }
            if (terms.length === 0) return `P_{${n}}(x) = 0`;
            let originalFunc = func === 'sin' ? '\\sin(x)' : func === 'cos' ? '\\cos(x)' : 'e^x';
            return `${originalFunc} \\approx P_{${n}}(x) = ` + terms.join(' ');
        }

        // 3. 차트 초기 설정
        const xValues = [];
        for (let i = -10; i <= 10; i += 0.05) xValues.push(i);

        let isPlotInitialized = false;
        let lastRenderedN = -1;

        const layout = {
            margin: { t: 20, l: 40, r: 20, b: 30 }, // 그래프 여백 최소화
            xaxis: { range: [-10, 10], title: '', zeroline: true, zerolinewidth: 2, zerolinecolor: '#9ca3af' },
            yaxis: { range: [-3, 3], title: '', zeroline: true, zerolinewidth: 2, zerolinecolor: '#9ca3af' },
            showlegend: true,
            legend: { x: 0.02, y: 0.98, bgcolor: 'rgba(255,255,255,0.8)' },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(250,250,250,1)',
            hovermode: 'x unified',
            autosize: true
        };

        const traceOriginalTemplate = { mode: 'lines', line: { color: '#3b82f6', width: 3 } };
        const traceTaylorTemplate = { mode: 'lines', line: { color: '#ef4444', width: 3, dash: 'dash' } };

        // 4. 화면 업데이트 로직
        function initOrUpdatePlot(isFunctionChange = false) {
            const func = document.getElementById('funcSelect').value;
            const continuousN = parseFloat(document.getElementById('nSlider').value);
            const integerN = Math.floor(continuousN);
            
            document.getElementById('nValueDisplay').innerText = continuousN.toFixed(1);

            const ySmoothTaylor = getSmoothTaylorY(func, continuousN, xValues);
            const funcNameMap = { 'sin': 'sin(x)', 'cos': 'cos(x)', 'exp': 'e^x' };

            if (!isPlotInitialized || isFunctionChange) {
                layout.yaxis.range = func === 'exp' ? [-2, 10] : [-3, 3];
                const yOriginal = getOriginalY(func, xValues);
                const traces = [
                    { ...traceOriginalTemplate, x: xValues, y: yOriginal, name: '원래 함수: ' + funcNameMap[func] },
                    { ...traceTaylorTemplate, x: xValues, y: ySmoothTaylor, name: `다항식 근사` }
                ];
                Plotly.react('plot', traces, layout, {responsive: true, displayModeBar: false});
                isPlotInitialized = true;
            } else {
                Plotly.restyle('plot', { 'y': [ySmoothTaylor] }, [1]);
            }

            if (lastRenderedN !== integerN || isFunctionChange) {
                const formulaStr = generatePolynomialString(func, integerN);
                const formulaElement = document.getElementById('formula');
                if (window.katex) katex.render(formulaStr, formulaElement, { throwOnError: false, displayMode: true });
                lastRenderedN = integerN;
            }
        }

        // 창 크기 변경 시 그래프 크기 자동 맞춤
        window.addEventListener('resize', () => {
            if(isPlotInitialized) Plotly.Plots.resize(document.getElementById('plot'));
        });

        document.getElementById('funcSelect').addEventListener('change', () => initOrUpdatePlot(true));
        document.getElementById('nSlider').addEventListener('input', () => initOrUpdatePlot(false));

        window.onload = () => setTimeout(() => initOrUpdatePlot(true), 100);
    </script>
</body>
</html>
